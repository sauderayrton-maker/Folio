I am writing to express my interest in the open position. With hands-on experience in marketing coordination, administrative support, and customer service, I am confident I can bring strong organizational skills and a collaborative approach to your team.</textarea

In my current role as a Marketing Coordinator at Northbridge Media, I have developed strong skills in campaign management, content coordination, and cross-team collaboration. Prior to this, I worked as an Administrative Assistant at Clearview Consulting, where I managed scheduling, reporting, and day-to-day office operations for a busy team.

At Summit Retail Group, I gained valuable experience in customer service and problem-solving, resolving inquiries and building strong client relationships in a fast-paced environment. These experiences have shaped a reliable, detail-oriented approach to professional work.

I hold a Bachelor of Business Administration and a Google Analytics certification.</textarea

        <script>
            /* ── DATA ── */
            const jobs = [
                {
                    title: "Marketing Coordinator",
                    org: "Northbridge Media",
                    loc: "Toronto, ON",
                    date: "Jan 2024 – Present",
                    bullets:
                        "Coordinated multi-channel marketing campaigns from planning through execution, contributing to a 20% increase in engagement.\nManaged the social media content calendar and collaborated with the design team to produce on-brand assets.\nTracked campaign performance using analytics tools and presented findings to stakeholders.",
                },
                {
                    title: "Administrative Assistant",
                    org: "Clearview Consulting",
                    loc: "Toronto, ON",
                    date: "Jun 2022 – Dec 2023",
                    bullets:
                        "Managed scheduling, correspondence, and file organization for a team of 12 consultants.\nPrepared reports and presentations using Microsoft Office Suite for client meetings.\nStreamlined office procedures, reducing document processing time by 15%.",
                },
                {
                    title: "Customer Support Specialist",
                    org: "Summit Retail Group",
                    loc: "Toronto, ON",
                    date: "Summer 2021",
                    bullets:
                        "Resolved customer inquiries and issues via phone and email, maintaining a high satisfaction rating.\nProcessed orders and returns accurately in a fast-paced retail environment.\nTrained new team members on store systems and customer service standards.",
                },
            ];

            const skillGroups = [
                {
                    heading: "Hard Skills",
                    skills: [
                        "Project Management",
                        "Microsoft Office Suite",
                        "Data Analysis",
                        "Social Media Management",
                        "CRM Software",
                    ],
                },
                {
                    heading: "Soft Skills",
                    skills: [
                        "Communication",
                        "Problem Solving",
                        "Team Collaboration",
                        "Time Management",
                        "Adaptability",
                    ],
                },
            ];

            const certs = [
                "Google Analytics Certified",
                "Project Management Fundamentals",
                "First Aid & CPR",
            ];

            const eduList = [
                {
                    school: "University of Toronto",
                    degree: "Bachelor of Business Administration",
                    date: "Graduated 2022",
                    loc: "Toronto, ON",
                },
            ];

            /* ── DESIGN STATE ── */
            const THEMES = [
                { id: "classic", name: "Classic" },
                { id: "modern", name: "Modern" },
                { id: "minimal", name: "Minimal" },
                { id: "elegant", name: "Elegant" },
                { id: "bold", name: "Bold" },
                { id: "slate", name: "Slate" },
                { id: "sidebar", name: "Sidebar" },
                { id: "timeline", name: "Timeline" },
                { id: "mono", name: "Mono" },
                { id: "onyx", name: "Onyx" },
            ];
            const ACCENTS = [
                "#c4622d",
                "#b23b4a",
                "#2f6f8f",
                "#3f7d58",
                "#5b53a6",
                "#1f8a8a",
                "#3a3a3a",
            ];
            const design = {
                theme: "classic",
                accent: "#c4622d",
                font: "sans",
                pageSize: "letter",
                density: "cozy",
            };
            const PAGE_RATIO = { letter: 11 / 8.5, a4: 297 / 210 };

            /* ── TOAST (shared impl in js/shell.js) ── */
            const toast = Folio.toast;

            /* ── SAVE STATUS ── */
            function setSaveStatus(state) {
                const wrap = document.getElementById("save-status");
                const txt = document.getElementById("save-text");
                wrap.classList.toggle("saving", state === "saving");
                wrap.classList.toggle("error", state === "error");
                txt.textContent =
                    state === "saving"
                        ? "Saving…"
                        : state === "error"
                          ? "Not saved!"
                          : "Saved";
            }

            /* ── KEYBOARD SHORTCUTS ── */
            document.addEventListener("keydown", (e) => {
                const mod = e.ctrlKey || e.metaKey;
                if (mod && e.key === "s") {
                    e.preventDefault();
                    if (saveSnapshot()) toast("saved ✓");
                    else toast("couldn't save — browser storage may be full");
                }
                if (mod && e.key === "p") {
                    e.preventDefault();
                    window.print();
                }
                if (e.altKey && e.key === "1") {
                    e.preventDefault();
                    switchDocByName("resume");
                }
                if (e.altKey && e.key === "2") {
                    e.preventDefault();
                    switchDocByName("coverletter");
                }
                if (e.altKey && e.key === "ArrowRight") {
                    e.preventDefault();
                    nextTab();
                }
                if (e.altKey && e.key === "ArrowLeft") {
                    e.preventDefault();
                    prevTab();
                }
            });

            /* ── AUTOSAVE ── */
            let _saveTimer = null;
            function scheduleSave() {
                setSaveStatus("saving");
                clearTimeout(_saveTimer);
                _saveTimer = setTimeout(() => {
                    if (saveSnapshot()) setSaveStatus("saved");

                    if (d.design.font) design.font = d.design.font;
                    if (d.design.pageSize) design.pageSize = d.design.pageSize;
                    if (d.design.density) design.density = d.design.density;

                if (d.info) {
                    setVal("r-name", d.info.name);
                    setVal("r-headline", d.info.headline);
                    setVal("r-phone", d.info.phone);
                    setVal("r-email", d.info.email);
                    setVal("r-city", d.info.city);
                    setVal("r-locrest", d.info.locrest);
                    setVal("r-link", d.info.link);
                    setVal("r-summary", d.info.summary);
                }
                if (d.eduList) {
                    eduList.length = 0;
                    d.eduList.forEach((e) => eduList.push(e));
                } else if (d.edu) {
                    // backward-compat with the old single-entry format
                    eduList.length = 0;
                    eduList.push({
                        school: d.edu.school,
                        degree: d.edu.degree,
                        date: d.edu.eduDate,
                        loc: d.edu.eduLoc,

                if (d.jobs) {

                if (d.skillGroups) {
                    skillGroups.length = 0;
                    d.skillGroups.forEach((g) => skillGroups.push(g));
                }
                if (d.certs) {
                    certs.length = 0;
                    d.certs.forEach((c) => certs.push(c));
                }
                if (d.cl) {
                    setVal("cl-manager", d.cl.manager);
                    setVal("cl-company", d.cl.company);
                    setVal("cl-position", d.cl.position);
                    setVal("cl-addr", d.cl.addr);
                    setVal("cl-opening", d.cl.opening);
                    setVal("cl-body", d.cl.body);
                    setVal("cl-closing", d.cl.closing);
                    setVal("cl-val", d.cl.val);
                    setVal("cl-date", d.cl.date);

                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, "-")
                    .replace(/^-|-$/g, "");
                const blob = new Blob([JSON.stringify(data, null, 2)], {
                    type: "application/json",

                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${name || "resume"}.json`;
                a.click();

            /* ── CUSTOM TAB SCROLLBAR ── */
            (function initTabScrollbar() {
                const tabs = document.getElementById("resume-section-tabs");
                const wrap = document.getElementById("tab-scrollbar");
                const track = document.getElementById("tab-scrollbar-track");
                const thumb = document.getElementById("tab-scrollbar-thumb");
                if (!tabs || !wrap || !track || !thumb) return;

                function update() {
                    const trackW = track.offsetWidth;
                    const ratio = tabs.clientWidth / tabs.scrollWidth;
                    if (ratio >= 1) {
                        wrap.classList.add("hidden");
                        return;
                    }
                    wrap.classList.remove("hidden");
                    const thumbW = Math.max(24, trackW * ratio);
                    const maxThumbLeft = trackW - thumbW;
                    const maxScroll = tabs.scrollWidth - tabs.clientWidth;
                    const left =
                        maxThumbLeft * (tabs.scrollLeft / maxScroll);
                    thumb.style.width = thumbW + "px";
                    thumb.style.left = left + "px";
                }

                let dragging = false,
                    dragStartX = 0,
                    dragStartScroll = 0;
                thumb.addEventListener("mousedown", (e) => {
                    dragging = true;
                    thumb.classList.add("dragging");
                    dragStartX = e.clientX;
                    dragStartScroll = tabs.scrollLeft;
                    e.preventDefault();
                });
                window.addEventListener("mousemove", (e) => {
                    if (!dragging) return;
                    const trackW = track.offsetWidth;
                    const thumbW = thumb.offsetWidth;
                    const maxThumbLeft = trackW - thumbW;
                    const maxScroll = tabs.scrollWidth - tabs.clientWidth;
                    const dx = e.clientX - dragStartX;
                    tabs.scrollLeft =
                        dragStartScroll +
                        (dx / maxThumbLeft) * maxScroll;
                });
                window.addEventListener("mouseup", () => {
                    if (!dragging) return;
                    dragging = false;
                    thumb.classList.remove("dragging");
                });
                track.addEventListener("click", (e) => {
                    if (e.target === thumb) return;
                    const rect = track.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const thumbW = thumb.offsetWidth;
                    const maxThumbLeft = track.offsetWidth - thumbW;
                    const targetLeft = Math.min(
                        Math.max(clickX - thumbW / 2, 0),
                        maxThumbLeft,
                    );
                    const maxScroll = tabs.scrollWidth - tabs.clientWidth;
                    tabs.scrollLeft = (targetLeft / maxThumbLeft) * maxScroll;
                });

                tabs.addEventListener("scroll", update);
                window.addEventListener("resize", update);
                update();
                window.updateTabScrollbar = update;
            })();

            function nextTab() {
                if (currentDoc !== "resume") return;
                const i = tabOrder.indexOf(currentTab);
                if (i < tabOrder.length - 1) switchTab(tabOrder[i + 1]);

                // drive the real PDF page size

                if (!ps) {

                    ps.id = "print-page-style";
                    document.head.appendChild(ps);

            /* ── ONE-PAGE FIT METER ── */
            function updateFit() {
                const rp = document.getElementById("rp");
                const meter = document.getElementById("fit-meter");
                const edge = document.getElementById("page-edge");
                if (!rp || !meter) return;
                const width = rp.clientWidth;
                if (!width) return; // hidden (e.g. cover-letter view)
                const pageH = width * (PAGE_RATIO[design.pageSize] || PAGE_RATIO.letter);
                rp.style.minHeight = pageH + "px";
                const pages = rp.scrollHeight / pageH;
                if (pages <= 1.02) {
                    meter.textContent = "✓ Fits 1 page";
                    meter.className = "fit-meter ok";
                    edge.style.display = "none";
                } else if (pages < 1.25) {
                    meter.textContent = "Slightly over — try Compact";
                    meter.className = "fit-meter warn";
                    edge.style.top = pageH + "px";
                    edge.style.display = "block";
                } else {
                    meter.textContent = `≈ ${pages.toFixed(1)} pages`;
                    meter.className = "fit-meter over";
                    edge.style.top = pageH + "px";
                    edge.style.display = "block";
                }
            }

            /* ── CERT EDITOR ── */
            function buildCertEditor() {
                const list = document.getElementById("cert-list");
                list.innerHTML = "";
                certs.forEach((cert, i) => {
                    const d = document.createElement("div");
                    d.className = "cert-row";
                    d.innerHTML = `<input class="cert-input" value="${x(cert)}" oninput="certs[${i}]=this.value;renderResume()"><button class="icon-btn del" onclick="removeCert(${i})" title="Remove">✕</button>`;
                    list.appendChild(d);
                });
            }
            function addCert() {
                certs.push("New Certification");
                buildCertEditor();
                renderResume();
            }
            function removeCert(i) {
                const item = certs[i];
                certs.splice(i, 1);
                buildCertEditor();
                renderResume();
                toast("certification removed", {
                    label: "Undo",
                    fn: () => {
                        certs.splice(i, 0, item);
                        buildCertEditor();
                        renderResume();
                    },
                });
            }

            /* ── HELPERS ── */
            const x = Folio.esc; // shared impl in js/shell.js
            function v(id) {
                const el = document.getElementById(id);
                return el ? el.value : "";
            }

            /* ── RESUME HTML ── */
            function buildResumeHTML() {
                const name = v("r-name"),
                    headline = v("r-headline"),
                    phone = v("r-phone"),
                    email = v("r-email"),
                    city = v("r-city"),
                    locrest = v("r-locrest"),
                    link = v("r-link"),
                    summary = v("r-summary");
                const loc = [city, locrest].filter(Boolean).join(", ");
                const contactParts = [];
                if (loc)
                    contactParts.push(
                        `<span class="rp-contact-item">${x(loc)}</span>`,
                    );
                if (phone)
                    contactParts.push(
                        `<a class="rp-contact-item" href="tel:${x(phone.replace(/[^\d+]/g, ""))}">${x(phone)}</a>`,
                    );
                if (email)
                    contactParts.push(
                        `<a class="rp-contact-item" href="mailto:${x(email)}">${x(email)}</a>`,
                    );
                if (link) {
                    const href = /^https?:\/\//i.test(link)
                        ? link
                        : "https://" + link;
                    contactParts.push(
                        `<a class="rp-contact-item" href="${x(href)}" target="_blank" rel="noopener">${x(link)}</a>`,
                    );
                }
                const contact = contactParts.join("");
                const headlineHTML = headline.trim()
                    ? `<div class="rp-headline">${x(headline)}</div>`
                    : "";
                const summaryHTML = summary.trim()
                    ? `<div class="rp-summary-wrap"><div class="rp-section-label">Summary</div><p class="rp-summary">${x(summary).replace(/\n/g, "<br>")}</p></div>`
                    : "";
                const jobsHTML = jobs
                    .map((j) => {
                        const bl = j.bullets
                            .split("\n")
                            .filter((b) => b.trim())
                            .map((b) => `<li>${x(b.trim())}</li>`)
                            .join("");
                        return `<div class="rp-entry"><div class="rp-row"><span class="rp-title">${x(j.title)}</span><span class="rp-date">${x(j.date)}</span></div><div class="rp-org">${[x(j.org), x(j.loc)].filter(Boolean).join(" · ")}</div><ul class="rp-bullets">${bl}</ul></div>`;
                    })
                    .join("");
                const skillsHTML = skillGroups
                    .map((g) =>
                        g.skills.length
                            ? `<div class="rp-section"><div class="rp-section-label">${x(g.heading)}</div><div class="rp-chips">${g.skills.map((s) => `<span class="rp-chip">${x(s)}</span>`).join("")}</div></div>`
                            : "",
                    )
                    .join("");
                const certsHTML = certs.length
                    ? `<div class="rp-section"><div class="rp-section-label">Certifications</div>${certs.map((c) => `<div class="rp-cert">${x(c)}</div>`).join("")}</div>`
                    : "";
                const eduHTML = eduList.length
                    ? `<div class="rp-section"><div class="rp-section-label">Education</div>${eduList
                          .map(
                              (ed) =>
                                  `<div class="rp-edu-item"><div class="rp-edu-school">${x(ed.school)}</div><div class="rp-edu-deg">${x(ed.degree)}</div><div class="rp-edu-date">${[x(ed.date), x(ed.loc)].filter(Boolean).join(" · ")}</div></div>`,
                          )
                          .join("")}</div>`
                    : "";
                return `<div class="rp-header"><div class="rp-name">${x(name)}</div>${headlineHTML}<div class="rp-contact">${contact}</div></div>
    ${summaryHTML}
    <div class="rp-body"><main><div class="rp-section"><div class="rp-section-label">Work Experience</div>${jobsHTML}</div></main>
    <aside>${eduHTML}${skillsHTML}${certsHTML}<div class="rp-refs">References available upon request.</div></aside></div>`;
            }

            /* ── CL HTML ── */
            function buildCLHTML() {
                const name = v("r-name"),
                    headline = v("r-headline").trim(),
                    phone = v("r-phone"),
                    email = v("r-email"),
                    city = v("r-city"),
                    locrest = v("r-locrest"),
                    link = v("r-link");
                const manager = v("cl-manager").trim(),
                    company = v("cl-company").trim(),
                    position = v("cl-position").trim(),
                    addr = v("cl-addr").trim();
                const opening = v("cl-opening"),
                    body = v("cl-body"),
                    closing = v("cl-closing"),
                    val = v("cl-val") || "Sincerely";
                const dateStr =
                    v("cl-date") ||
                    new Date().toLocaleDateString("en-CA", {
                        month: "long",
                        year: "numeric",
                    });
                const fullBody = [opening, body, closing]
                    .filter(Boolean)
                    .join("\n\n");
                const loc = [city, locrest].filter(Boolean).join(", ");

                // sender contact — clickable, matching the résumé
                const senderParts = [];
                if (loc) senderParts.push(`<span>${x(loc)}</span>`);
                if (phone)
                    senderParts.push(
                        `<a href="tel:${x(phone.replace(/[^\d+]/g, ""))}">${x(phone)}</a>`,
                    );
                if (email)
                    senderParts.push(
                        `<a href="mailto:${x(email)}">${x(email)}</a>`,
                    );
                if (link) {
                    const href = /^https?:\/\//i.test(link)
                        ? link
                        : "https://" + link;
                    senderParts.push(
                        `<a href="${x(href)}" target="_blank" rel="noopener">${x(link)}</a>`,
                    );
                }

                // recipient block — only render lines that exist
                const recipientHTML = [
                    manager
                        ? `<div class="cl-recipient-name">${x(manager)}</div>`
                        : "",
                    company
                        ? `<div class="cl-recipient-detail">${x(company)}</div>`
                        : "",
                    addr
                        ? `<div class="cl-recipient-detail">${x(addr)}</div>`
                        : "",
                ].join("");

                // subject line — gives the Position field a purpose
                const subjectText = position
                    ? `Application for ${x(position)}${company ? " at " + x(company) : ""}`
                    : company
                      ? `Application — ${x(company)}`
                      : "";
                const subjectHTML = subjectText
                    ? `<div class="cl-subject">Re: ${subjectText}</div>`
                    : "";

                const greeting = manager || "Hiring Manager";

                return `<div class="cl-date">${x(dateStr)}</div>
    <div class="cl-sender-name">${x(name)}</div>
    ${headline ? `<div class="cl-sender-role">${x(headline)}</div>` : ""}
    <div class="cl-sender-contact">${senderParts.join("<br>")}</div>
    <div class="cl-bar"></div>
    ${recipientHTML}
    ${subjectHTML}
    <div class="cl-salutation">Dear ${x(greeting)},</div>
    <div class="cl-body">${x(fullBody)}</div>
    <div class="cl-closing">${x(val)},</div>
    <div class="cl-sig">${x(name)}</div>`;
            }

            function updateResumeMeta() {
                const meta = document.getElementById("resume-meta");
                const t = THEMES.find((t) => t.id === design.theme);
                meta.textContent = t ? t.name : "";
            }

            function renderResume() {
                const h = buildResumeHTML();
                document.getElementById("rp").innerHTML = h;
                document.getElementById("print-rp").innerHTML = h;
                updateResumeMeta();
                updateFit();
                updateResumeStrength();
                updateTabCounts();
                scheduleSave();
            }

            /* ── PROGRESS ── */
            function updateResumeStrength() {
                let score = 0;
                if (v("r-name").trim()) score += 10;
                if (v("r-headline").trim()) score += 8;
                if (v("r-phone").trim() && v("r-email").trim()) score += 8;
                if (v("r-city").trim() && v("r-locrest").trim()) score += 6;
                if (v("r-summary").trim().length >= 40) score += 12;
                if (jobs.some((j) => j.title.trim() && j.org.trim()))
                    score += 18;
                if (eduList.some((e) => e.school.trim())) score += 12;
                if (skillGroups.some((g) => g.skills.length)) score += 16;
                if (certs.length) score += 6;
                if (v("r-link").trim()) score += 4;

                const pct = Math.min(100, Math.round(score));
                const circumference = 97.4;
                const fill = document.getElementById("strength-fill");
                if (!fill) return;
                fill.style.strokeDashoffset =
                    circumference * (1 - pct / 100);
                document.getElementById("strength-pct").textContent =
                    pct + "%";
                document
                    .getElementById("strength-meter")
                    .classList.toggle("complete", pct >= 100);
                document.getElementById("strength-meter").title =
                    pct >= 100
                        ? "Resume strength: complete"
                        : `Resume strength: ${pct}%`;
            }

            function updateTabCounts() {
                const setCount = (id, n) => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = n > 0 ? n : "";
                };
                setCount("tc-exp", jobs.length);
                setCount("tc-edu", eduList.length);
                setCount(
                    "tc-skills",
                    skillGroups.reduce((s, g) => s + g.skills.length, 0),
                );
                setCount("tc-certs", certs.length);
            }

            function renderCL() {
                const h = buildCLHTML();
                document.getElementById("clp").innerHTML = h;
                document.getElementById("print-cl").innerHTML = h;
                scheduleSave();
            }

            function rebuildAll() {
                buildJobEditor();
                buildEduEditor();
                buildSkillEditor();
                buildCertEditor();
                applyDesign();
                syncDesignUI();
                renderResume();
                renderCL();
            }

            /* ── INIT ── */
            loadSnapshot();
            buildDesignPanel();
            buildJobEditor();
            buildEduEditor();
            buildSkillEditor();
            buildCertEditor();
            applyDesign();
            renderResume();
            renderCL();
            setSaveStatus("saved");

            /* keep the fit meter accurate as fonts load / window resizes */
            let _fitRAF;
            window.addEventListener("resize", () => {
                cancelAnimationFrame(_fitRAF);
                _fitRAF = requestAnimationFrame(updateFit);
            });
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(updateFit);
            }
            setTimeout(updateFit, 300);
        </script>
    </body>
</html>
